  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Segoe UI, system-ui, sans-serif;
      background: #0a0a1a;
      color: #e8e8e8;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem 1rem;
      text-align: center;
    }
    header {
      margin-bottom: 1.5rem;
    }
    header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.02em;
    }
    header p { color: #888; font-size: 0.85rem; margin-top: 0.2rem; }

    #error-banner {
      display: none;
      background: #3a0a0a;
      border: 1px solid #c0392b;
      border-radius: 10px;
      padding: 1rem 1.2rem;
      margin-bottom: 1.5rem;
      color: #f5b7b1;
      font-size: 0.9rem;

      max-width: 380px;
      width: 100%;
    }
    #error-banner strong { color: #f1948a; display: block; margin-bottom: 0.3rem; }

    #status-card {
      background: #111c17;
      border: 1px solid #1f3d2d;
      border-radius: 14px;
      padding: 1.5rem 1.6rem;
      max-width: 380px;
      width: 100%;
      margin-bottom: 1rem;
    }
    #status-icon {
      font-size: 2.5rem;
      margin-bottom: 0.7rem;
      line-height: 1;
    }
    #status-text {
      font-size: 1rem;
      font-weight: 600;
      color: #86efac;
      margin-bottom: 0.3rem;
    }
    #status-sub {
      font-size: 0.82rem;
      color: #6b9b7a;
    }
    #session-chip {
      display: inline-block;
      background: #1a3526;
      border: 1px solid #2a5038;
      border-radius: 20px;
      padding: 0.2rem 0.65rem;
      font-size: 0.72rem;
      color: #86efac;
      margin-top: 0.8rem;
      font-family: monospace;
      letter-spacing: 0.05em;
    }

    #start-btn {
      display: block;
      width: 100%;
      max-width: 380px;
      margin-top: 0.5rem;
      padding: 0.9rem 1rem;
      background: #16a34a;
      color: #f0faf4;
      font-size: 1rem;
      font-weight: 700;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.15s;
    }
    #start-btn:hover { background: #15803d; }
    #start-btn:active { background: #14532d; }
    #start-btn:disabled { background: #1a3020; color: #3a6040; cursor: default; }

    #upload-bar-wrap {
      display: none;
      width: 100%;
      max-width: 380px;
      height: 4px;
      background: #1a2a1a;
      border-radius: 2px;
      margin-top: 0.75rem;
      overflow: hidden;
    }
    #upload-bar {
      height: 100%;
      width: 0%;
      background: #16a34a;
      border-radius: 2px;
      transition: width 0.2s;
    }

    footer { margin-top: 2rem; font-size: 0.73rem; color: #333; }

    /* hidden video */
    video { display: none; }

<body>

<header>
  <h1>RollShare Cloud</h1>
  <p>Point your phone at the dice tray</p>
</header>

<div id="error-banner" role="alert">
  <strong id="error-title">Something went wrong</strong>
  <span id="error-msg">Check that the QR code is valid and the Companion App is running.</span>
</div>

<div id="status-card">
  <div id="status-icon">📷</div>
  <div id="status-text">Waiting to start…</div>
  <div id="status-sub">Tap the button below to begin</div>
  <div id="session-chip" style="display:none"></div>
</div>

<button id="start-btn">Start camera</button>
<div id="upload-bar-wrap"><div id="upload-bar"></div></div>

<video id="cam-video" autoplay playsinline muted></video>

<footer>Cloud path · video never stored permanently</footer>

<script>
(function () {
  "use strict";

  // ── Constants (ported from motion_detector.py / dice_analysis.py) ─────────
  var MOTION_THRESHOLD_MIN        = 3;
  var MOTION_THRESHOLD_MULTIPLIER = 2.0;
  var MOTION_NOISE_EMA_ALPHA      = 0.02;
  var JUST_SETTLED_DELAY_FRAMES   = 4;   // ~0.33 s at 12 fps
  var GRAB_SPIKE_WINDOW           = 20;
  var GRAB_THRESHOLD              = 35.0;

  // ── MotionDetector (JS port of motion_detector.py) ────────────────────────
  function MotionDetector() {
    this.noiseEma  = MOTION_THRESHOLD_MIN / MOTION_THRESHOLD_MULTIPLIER;
    this.prevGray  = null;
    this.history   = [];  // rolling diffMean, maxlen 300
    this.threshold = MOTION_THRESHOLD_MIN;
  }

  MotionDetector.prototype.update = function (grayPixels) {
    var diffMean = 0;
    this.threshold = Math.max(MOTION_THRESHOLD_MIN, this.noiseEma * MOTION_THRESHOLD_MULTIPLIER);
    if (this.prevGray) {
      var sum = 0;
      for (var i = 0; i < grayPixels.length; i++)
        sum += Math.abs(grayPixels[i] - this.prevGray[i]);
      diffMean = sum / grayPixels.length;
      if (diffMean < this.threshold)
        this.noiseEma = MOTION_NOISE_EMA_ALPHA * diffMean + (1 - MOTION_NOISE_EMA_ALPHA) * this.noiseEma;
      this.threshold = Math.max(MOTION_THRESHOLD_MIN, this.noiseEma * MOTION_THRESHOLD_MULTIPLIER);
    }
    this.prevGray = grayPixels.slice();
    if (this.history.length >= 300) this.history.shift();
    this.history.push(diffMean);
    return { inMotion: diffMean > this.threshold, diffMean: diffMean };
  };

  MotionDetector.prototype.peakBeforeSettle = function (settleDelay, window) {
    var n     = this.history.length;
    var end   = n - settleDelay;
    var start = end - window;
    if (start < 0 || end <= 0) return 0;
    var peak = 0;
    var slice = this.history.slice(start, end);
    for (var i = 0; i < slice.length; i++) if (slice[i] > peak) peak = slice[i];
    return peak;
  };

  MotionDetector.prototype.reset = function () { this.prevGray = null; };

  // ── Globals ────────────────────────────────────────────────────────────────
  var params    = new URLSearchParams(window.location.search);
  var sessionId = params.get('s') || '';
  var isDev     = params.get('dev') === '1';

  // UI refs
  var statusCard  = document.getElementById('status-card');
  var statusIcon  = document.getElementById('status-icon');
  var statusText  = document.getElementById('status-text');
  var statusSub   = document.getElementById('status-sub');
  var sessionChip = document.getElementById('session-chip');
  var startBtn    = document.getElementById('start-btn');
  var errorBanner = document.getElementById('error-banner');
  var errorTitle  = document.getElementById('error-title');
  var errorMsg    = document.getElementById('error-msg');
  var uploadWrap  = document.getElementById('upload-bar-wrap');
  var uploadBar   = document.getElementById('upload-bar');
  var video       = document.getElementById('cam-video');

  var motionDetector = new MotionDetector();
  var supabase       = null;
  var frameSeq       = 0;
  var lastMotionFrame = 0;
  var settleFired    = false;
  var uploading      = false;
  var frameTimerId   = null;
  var capCanvas      = null;  // 320×240 for PNG upload
  var sfCanvas       = null;  // 160×120 for motion detection

  // ── Validate session ID ────────────────────────────────────────────────────
  if (!sessionId || sessionId.length < 10) {
    showError('Invalid link', 'This QR code is missing the session ID. Please rescan the QR code shown on the RollShare Companion App.');
    startBtn.disabled = true;
  } else {
    // Show last 6 chars of session ID as a pairing confirmation
    sessionChip.textContent = 'Session …' + sessionId.slice(-6);
    sessionChip.style.display = '';
  }

  function showError(title, msg) {
    errorTitle.textContent = title;
    errorMsg.textContent   = msg;
    errorBanner.style.display = 'block';
  }

  function setStatus(icon, text, sub) {
    statusIcon.textContent = icon;
    statusText.textContent = text;
    statusSub.textContent  = sub || '';
  }

  // ── Supabase init ──────────────────────────────────────────────────────────
  // Anon key is safe to embed in browser code (insert-only RLS).
  var SUPABASE_URL      = 'https://kkcgxhjsnhhwnmbtfwai.supabase.co';
  var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtrY2d4aGpzbmhod25tYnRmd2FpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1OTM3NjIsImV4cCI6MjA5MzE2OTc2Mn0.s-xTOZxkBAJx1VMS1-l0JJjg-hx901iYa2wkT5M05m0';

  function initSupabase() {
    try {
      var sb = window.supabase || (window.supabaseJs ? window.supabaseJs : null);
      if (sb && sb.createClient) {
        supabase = sb.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        return true;
      }
    } catch (e) {}
    return false;
  }

  // ── Canvas helpers ─────────────────────────────────────────────────────────
  function ensureCanvases() {
    if (!sfCanvas) {
      sfCanvas  = document.createElement('canvas');
      sfCanvas.width  = 160;
      sfCanvas.height = 120;
    }
    if (!capCanvas) {
      capCanvas = document.createElement('canvas');
      capCanvas.width  = 320;
      capCanvas.height = 240;
    }
  }

  // ── Frame processing ───────────────────────────────────────────────────────
  function processFrame() {
    if (video.readyState < 2) return;
    frameSeq++;

    var sfCtx = sfCanvas.getContext('2d', { willReadFrequently: true });
    sfCtx.drawImage(video, 0, 0, 160, 120);
    var imgData = sfCtx.getImageData(0, 0, 160, 120);

    // Grayscale: 0.299r + 0.587g + 0.114b
    var gray = new Uint8Array(160 * 120);
    for (var i = 0; i < gray.length; i++) {
      var p = i * 4;
      gray[i] = (0.299 * imgData.data[p] + 0.587 * imgData.data[p + 1] + 0.114 * imgData.data[p + 2]) | 0;
    }

    var result = motionDetector.update(gray);

    if (result.inMotion) {
      lastMotionFrame = frameSeq;
      settleFired = false;
      setStatus('🎲', 'Motion detected…', 'Keep rolling!');
    } else {
      var quietFrames = frameSeq - lastMotionFrame;
      if (!settleFired && quietFrames >= JUST_SETTLED_DELAY_FRAMES) {
        settleFired = true;
        var peak = motionDetector.peakBeforeSettle(JUST_SETTLED_DELAY_FRAMES, GRAB_SPIKE_WINDOW);
        if (peak > GRAB_THRESHOLD && !uploading) {
          uploadSettledFrame(peak, frameSeq);
        }
      }
    }
  }

  // ── Upload on settle ───────────────────────────────────────────────────────
  async function uploadSettledFrame(peakBeforeSettle, seq) {
    if (!supabase) return;
    uploading = true;
    setStatus('☁️', 'Settled — uploading…', 'Sending frame to RollShare');
    uploadWrap.style.display = '';
    uploadBar.style.width = '30%';

    try {
      var capCtx = capCanvas.getContext('2d');
      capCtx.drawImage(video, 0, 0, 320, 240);

      var blob = await new Promise(function (resolve) {
        capCanvas.toBlob(resolve, 'image/png');
      });
      if (!blob) throw new Error('toBlob returned null');

      var arrayBuf = await blob.arrayBuffer();
      var storagePath = sessionId + '/' + String(seq).padStart(6, '0') + '.png';

      uploadBar.style.width = '55%';

      // Upload to Storage (anon; RLS allows insert into settled-frames bucket)
      var upResult = await supabase.storage
        .from('settled-frames')
        .upload(storagePath, arrayBuf, { contentType: 'image/png', upsert: true });

      if (upResult.error) {
        console.error('Storage upload failed', upResult.error);
        setStatus('⚠️', 'Upload failed', upResult.error.message || 'Storage error');
        uploadWrap.style.display = 'none';
        uploading = false;
        return;
      }

      uploadBar.style.width = '80%';

      // Insert row → triggers Realtime notification to Companion
      var insResult = await supabase
        .from('settled_frames')
        .insert({
          session_id:         sessionId,
          storage_path:       storagePath,
          peak_before_settle: peakBeforeSettle,
          frame_seq:          seq,
        });

      if (insResult.error) {
        console.error('DB insert failed', insResult.error);
        setStatus('⚠️', 'Upload failed', insResult.error.message || 'DB error');
        uploadWrap.style.display = 'none';
        uploading = false;
        return;
      }

      uploadBar.style.width = '100%';
      setStatus('✅', 'Connected to RollShare ✓', 'Waiting for next roll…');
      if (!isDev) {
        try { posthog.capture('cloud_frame_uploaded', { session_short: sessionId.slice(-6) }); } catch(e) {}
      }
      setTimeout(function () { uploadBar.style.width = '0%'; uploadWrap.style.display = 'none'; }, 600);

    } catch (err) {
      console.error('uploadSettledFrame error', err);
      setStatus('⚠️', 'Upload error', String(err));
      uploadWrap.style.display = 'none';
    }

    uploading = false;
  }

  // ── Start camera + loop ────────────────────────────────────────────────────
  startBtn.addEventListener('click', async function () {
    startBtn.disabled = true;
    startBtn.textContent = 'Starting…';
    setStatus('⏳', 'Requesting camera…', 'Allow camera access when prompted');

    if (!initSupabase()) {
      showError('Supabase unavailable', 'Could not load the Supabase library. Check your internet connection and reload.');
      startBtn.disabled = false;
      startBtn.textContent = 'Try again';
      return;
    }

    try {
      var stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'environment', width: { ideal: 320 }, height: { ideal: 240 } },
        audio: false,
      });
      video.srcObject = stream;
      await video.play();
    } catch (err) {
      showError('Camera permission denied', 'Please allow camera access and try again. Error: ' + err.message);
      startBtn.disabled = false;
      startBtn.textContent = 'Try again';
      setStatus('📷', 'Camera not available', 'Grant camera permission above');
      return;
    }

    ensureCanvases();
    motionDetector.reset();
    setStatus('👀', 'Watching for motion…', 'Point your camera at the dice tray');
    startBtn.textContent = 'Running…';

    // 12 fps capture loop
    frameTimerId = setInterval(processFrame, Math.round(1000 / 12));

    if (!isDev) {
      try { posthog.capture('cloud_session_started', { session_short: sessionId.slice(-6) }); } catch(e) {}
    }
  });

})();
</script>
</body>
</html>
